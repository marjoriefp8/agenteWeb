<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Web con IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .contenedor { width: 700px; height: 80vh; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .header { background: #1a3a4a; color: white; padding: 20px; border-radius: 12px 12px 0 0; text-align: center; }
        .header h1 { font-size: 20px; }
        .header p { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .mensajes { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .mensaje { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
        .usuario { background: #1a3a4a; color: white; align-self: flex-end; border-radius: 12px 12px 0 12px; }
        .asistente { background: #f0f2f5; color: #333; align-self: flex-start; border-radius: 12px 12px 12px 0; }
        .buscando { background: #fff3cd; color: #856404; align-self: flex-start; border-radius: 12px; font-size: 13px; padding: 8px 14px; }
        .input-area { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
        input:focus { border-color: #1a3a4a; }
        button { padding: 12px 24px; background: #1a3a4a; color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 14px; }
        button:hover { background: #243f52; }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="header">
            <h1>Agente Web con IA</h1>
            <p>Busca información actualizada en internet</p>
        </div>
        <div class="mensajes" id="mensajes">
            <div class="mensaje asistente">¡Hola! Puedo buscar información actualizada en internet. ¿Qué quieres saber?</div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Pregúntame algo..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById("input");
            const mensajes = document.getElementById("mensajes");
            const texto = input.value.trim();
            if (!texto) return;

            mensajes.innerHTML += `<div class="mensaje usuario">${texto}</div>`;
            input.value = "";
            mensajes.innerHTML += `<div class="buscando" id="cargando">🔍 Buscando en internet...</div>`;
            mensajes.scrollTop = mensajes.scrollHeight;

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mensaje: texto })
            });

            const data = await res.json();
            document.getElementById("cargando").remove();
            mensajes.innerHTML += `<div class="mensaje asistente">${data.respuesta}</div>`;
            mensajes.scrollTop = mensajes.scrollHeight;
        }
    </script>
</body>
</html>
